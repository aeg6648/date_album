<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리의 데이트 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
    background: linear-gradient(180deg, #FFE8EC 0%, #FFD4E5 25%, #E8DCFF 55%, #D4E5FF 80%, #C8DCF5 100%);
    padding: 24px 16px;
    color: #4A3F5C;
    min-height: 100vh;
  }
  .back-btn-wrap { max-width: 420px; margin: 0 auto 12px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: rgba(255, 255, 255, 0.85);
    border-radius: 14px; font-size: 12px; font-weight: 700;
    color: #8B7BA8; text-decoration: none;
    box-shadow: 0 4px 12px rgba(200, 180, 220, 0.2);
  }
  .container {
    max-width: 420px; margin: 0 auto;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 32px; padding: 32px 22px;
    box-shadow: 0 20px 60px rgba(200, 180, 220, 0.35);
  }

  .header { text-align: center; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 2px dashed #F8D4E0; }
  .header .emoji { font-size: 42px; margin-bottom: 8px; line-height: 1; }
  .header h1 { font-size: 24px; color: #E87A9E; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 6px; }
  .header .date { font-size: 13px; color: #8B7BA8; font-weight: 700; margin-bottom: 4px; }
  .header .route {
    display: inline-block; font-size: 11.5px; color: #9B88B8;
    background: #F8EEFA; padding: 5px 12px; border-radius: 12px;
    margin-top: 6px; font-weight: 600;
  }

  .section-label { display: flex; align-items: center; margin: 20px 0 12px 0; gap: 8px; }
  .section-label:first-of-type { margin-top: 4px; }
  .section-label .dot { width: 8px; height: 8px; border-radius: 50%; }
  .section-label .text { font-size: 12px; font-weight: 800; letter-spacing: 0.5px; }
  .section-label .line { flex: 1; height: 1px; background: #EADFF0; }
  .sec-1 .dot { background: #F4A6A6; } .sec-1 .text { color: #D96B6B; }
  .sec-2 .dot { background: #A8C5E8; } .sec-2 .text { color: #5E87B8; }
  .sec-3 .dot { background: #FFC857; } .sec-3 .text { color: #C88510; }
  .sec-4 .dot { background: #A8D8B9; } .sec-4 .text { color: #5A9670; }

  .item { display: flex; gap: 12px; margin-bottom: 10px; align-items: stretch; }
  .time-col { flex-shrink: 0; width: 54px; display: flex; flex-direction: column; align-items: center; padding-top: 12px; }
  .time-badge {
    font-size: 13px; font-weight: 800; color: #4A3F5C;
    background: #FFFFFF; padding: 4px 8px; border-radius: 10px;
    border: 2px solid #FFD4E5; letter-spacing: -0.3px;
  }
  .item.highlight .time-badge { background: #FFE8A3; border-color: #FFC857; color: #8B5A00; }
  .item.boat .time-badge { border-color: #A8C5E8; }
  .item.food .time-badge { border-color: #F4A6A6; }
  .item.cafe .time-badge { border-color: #D4B8E8; }
  .item.walk .time-badge { border-color: #A8D8B9; }

  .card-ti {
    flex: 1; background: #FFFFFF; border-radius: 16px; padding: 12px 14px;
    box-shadow: 0 2px 10px rgba(200, 180, 220, 0.15); position: relative;
  }
  .item.highlight .card-ti { background: linear-gradient(135deg, #FFF4D6 0%, #FFE8C2 100%); border: 2px solid #FFD88A; }
  .item.boat .card-ti { background: linear-gradient(135deg, #EDF4FC 0%, #DCE8F7 100%); }
  .item.food .card-ti { background: linear-gradient(135deg, #FFF0F0 0%, #FFE0E0 100%); }
  .item.cafe .card-ti { background: linear-gradient(135deg, #F5EDFB 0%, #ECDCF7 100%); }
  .item.walk .card-ti { background: linear-gradient(135deg, #EEF8F1 0%, #DEEFE4 100%); }

  .card-ti .title { font-size: 15px; font-weight: 800; color: #4A3F5C; margin-bottom: 4px; letter-spacing: -0.3px; }
  .card-ti .desc { font-size: 12px; color: #7A6B94; line-height: 1.55; }
  .card-ti .tag {
    display: inline-block; padding: 2px 9px; background: #FFE0E8;
    border-radius: 10px; font-size: 10px; color: #D96B8A;
    margin-top: 6px; font-weight: 700;
  }
  .card-ti .tag.yellow { background: #FFF3C4; color: #B8860B; }
  .card-ti .tag.blue { background: #DCE8F7; color: #5E87B8; }
  .card-ti .tag.green { background: #E0F0E6; color: #5A9670; }
  .card-ti .tag.purple { background: #ECDCF7; color: #9670BA; }

  .transport {
    display: flex; align-items: center; gap: 8px;
    margin: 0 0 10px 66px; padding: 6px 12px;
    background: rgba(255, 255, 255, 0.6); border-radius: 20px;
    border-left: 3px solid #D4B8E8;
  }
  .transport .arrow { font-size: 14px; color: #B8A8CC; }
  .transport .mode { font-size: 11px; color: #8B7BA8; font-weight: 700; letter-spacing: 0.2px; }
  .transport .duration { font-size: 10px; color: #B8A8CC; font-weight: 600; margin-left: auto; }
  .transport.boat-mode { background: linear-gradient(90deg, #EDF4FC, #DCE8F7); border-left-color: #5E87B8; }
  .transport.boat-mode .mode { color: #5E87B8; }
  .transport.subway-mode { background: linear-gradient(90deg, #F5EDFB, #ECDCF7); border-left-color: #9670BA; }
  .transport.subway-mode .mode { color: #9670BA; }
  .transport.walk-mode { background: linear-gradient(90deg, #EEF8F1, #DEEFE4); border-left-color: #6BA37E; }
  .transport.walk-mode .mode { color: #6BA37E; }
  .transport.car-mode { background: linear-gradient(90deg, #FFF0F0, #FFE0E0); border-left-color: #D96B6B; }
  .transport.car-mode .mode { color: #D96B6B; }

  .info-box {
    margin-top: 16px; padding: 14px;
    background: #FFF8E8; border-radius: 14px;
    border: 1.5px dashed #FFD88A;
  }
  .info-box .info-title { font-size: 12px; font-weight: 800; color: #B8860B; margin-bottom: 6px; }
  .info-box .info-list { font-size: 11.5px; color: #8B6B2B; line-height: 1.8; }
  .info-box .info-list div { padding-left: 14px; position: relative; }
  .info-box .info-list div::before { content: '✓'; position: absolute; left: 0; color: #D4900F; font-weight: 800; }

  /* Photos */
  .section-photos { margin-top: 22px; }
  .section-photos .sec-head {
    font-size: 13px; font-weight: 800;
    color: #9670BA; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .photo-grid img {
    width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
    border-radius: 12px; box-shadow: 0 2px 8px rgba(200, 180, 220, 0.3);
    cursor: pointer; transition: transform 0.15s;
  }
  .photo-grid img:hover { transform: scale(1.02); }

  /* Review */
  .review-box {
    margin-top: 22px; padding: 18px 16px;
    background: linear-gradient(135deg, #FFF4F7 0%, #F8EEFA 100%);
    border-radius: 18px;
    border: 1.5px solid #F8D4E0;
  }
  .review-box .r-head {
    font-size: 13px; font-weight: 800;
    color: #E87A9E; margin-bottom: 8px;
    display: flex; align-items: center; gap: 6px;
  }
  .review-box .r-body {
    font-size: 13px; color: #6A5A82; line-height: 1.75;
    white-space: pre-wrap; word-break: break-word;
  }

  .footer {
    margin-top: 24px; padding: 16px;
    background: linear-gradient(135deg, #FFE8EC 0%, #E8DCFF 100%);
    border-radius: 20px; text-align: center;
    font-size: 13px; color: #6A5A82; line-height: 1.7; font-weight: 600;
  }
  .footer .heart { color: #E87A9E; font-weight: 800; font-size: 14px; }
  .footer .small { display: block; font-size: 11px; color: #A89BB9; margin-top: 6px; font-weight: 500; }

  .loading, .error {
    max-width: 420px; margin: 80px auto;
    text-align: center; color: #8B7BA8;
    font-size: 14px; font-weight: 600;
  }

  /* Lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(50, 30, 60, 0.85);
    display: none; align-items: center; justify-content: center;
    z-index: 1000; padding: 20px;
    backdrop-filter: blur(6px);
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; }
  .lightbox .close {
    position: absolute; top: 20px; right: 20px;
    color: white; font-size: 28px; cursor: pointer;
    background: rgba(0,0,0,0.3); width: 40px; height: 40px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>
  <div class="back-btn-wrap">
    <a href="/" class="back-btn">‹ 앨범으로 돌아가기</a>
  </div>

  <div id="root">
    <div class="loading">불러오는 중… 💕</div>
  </div>

  <div class="lightbox" id="lightbox" onclick="this.classList.remove('open')">
    <div class="close">×</div>
    <img id="lb-img" alt="">
  </div>

<script>
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const root = document.getElementById('root');

  function escapeHtml(str) {
    if (str == null) return '';
    return String(str);
  }

  function renderEntry(e) {
    if (e.type === 'transport') {
      return `
        <div class="transport ${e.mode || ''}">
          <span class="arrow">↓</span>
          <span class="mode">${escapeHtml(e.label)}</span>
          ${e.duration ? `<span class="duration">${escapeHtml(e.duration)}</span>` : ''}
        </div>
      `;
    }
    const cls = ['item'];
    if (e.category) cls.push(e.category);
    if (e.highlight) cls.push('highlight');
    const tagHtml = e.tag && e.tag.text
      ? `<span class="tag ${e.tag.color || ''}">${escapeHtml(e.tag.text)}</span>`
      : '';
    return `
      <div class="${cls.join(' ')}">
        <div class="time-col"><div class="time-badge">${escapeHtml(e.time)}</div></div>
        <div class="card-ti">
          <div class="title">${escapeHtml(e.title)}</div>
          ${e.desc ? `<div class="desc">${e.desc}</div>` : ''}
          ${tagHtml}
        </div>
      </div>
    `;
  }

  function renderSection(s) {
    return `
      <div class="section-label ${s.colorClass || 'sec-1'}">
        <div class="dot"></div>
        <div class="text">${escapeHtml(s.label)}</div>
        <div class="line"></div>
      </div>
      ${(s.entries || []).map(renderEntry).join('')}
    `;
  }

  function renderDate(d) {
    document.title = `${d.title} 💕`;

    const sectionsHtml = (d.sections || []).map(renderSection).join('');
    const checklistHtml = (d.checklist && d.checklist.length > 0) ? `
      <div class="info-box">
        <div class="info-title">📌 꼭 챙길 것</div>
        <div class="info-list">
          ${d.checklist.map(c => `<div>${escapeHtml(c)}</div>`).join('')}
        </div>
      </div>
    ` : '';

    const photosHtml = (d.photos && d.photos.length > 0) ? `
      <div class="section-photos">
        <div class="sec-head">📷 사진</div>
        <div class="photo-grid">
          ${d.photos.map((src, i) => `<img src="${src}" alt="photo ${i+1}" loading="lazy" onclick="openLightbox('${src}')">`).join('')}
        </div>
      </div>
    ` : '';

    const reviewHtml = (d.review && d.review.trim()) ? `
      <div class="review-box">
        <div class="r-head">💌 후기</div>
        <div class="r-body">${escapeHtml(d.review)}</div>
      </div>
    ` : '';

    const footerHtml = (d.footerHeart || d.footerSub || d.footerSmall) ? `
      <div class="footer">
        ${d.footerHeart ? `💌 <span class="heart">${escapeHtml(d.footerHeart)}</span><br>` : ''}
        ${d.footerSub ? `${escapeHtml(d.footerSub)}` : ''}
        ${d.footerSmall ? `<span class="small">${escapeHtml(d.footerSmall)}</span>` : ''}
      </div>
    ` : '';

    root.innerHTML = `
      <div class="container">
        <div class="header">
          <div class="emoji">${escapeHtml(d.emoji || '💕')}</div>
          <h1>${escapeHtml(d.title)}</h1>
          <div class="date">${escapeHtml(d.weekday || '')}${d.subtitle ? ' · ' + escapeHtml(d.subtitle) : ''}</div>
          ${d.route ? `<div class="route">${escapeHtml(d.route)}</div>` : ''}
        </div>
        ${sectionsHtml}
        ${checklistHtml}
        ${photosHtml}
        ${reviewHtml}
        ${footerHtml}
      </div>
    `;
  }

  function openLightbox(src) {
    document.getElementById('lb-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  window.openLightbox = openLightbox;

  if (!id) {
    root.innerHTML = '<div class="error">데이트 ID가 없어요 😢<br><a href="/">앨범으로 돌아가기</a></div>';
  } else {
    fetch('/data/dates.json', { cache: 'no-store' })
      .then(r => r.json())
      .then(dates => {
        const d = dates.find(x => x.id === id);
        if (!d) {
          root.innerHTML = '<div class="error">해당 데이트를 찾을 수 없어요 😢<br><a href="/">앨범으로 돌아가기</a></div>';
          return;
        }
        renderDate(d);
      })
      .catch(err => {
        console.error(err);
        root.innerHTML = '<div class="error">불러오기 실패 😢<br><a href="/">앨범으로 돌아가기</a></div>';
      });
  }
</script>
</body>
</html>
