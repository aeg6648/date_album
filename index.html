<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리의 데이트 앨범 💕</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { -webkit-font-smoothing: antialiased; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, sans-serif;
    background: linear-gradient(180deg, #FFE8EC 0%, #FFD4E5 25%, #E8DCFF 55%, #D4E5FF 80%, #C8DCF5 100%);
    padding: 28px 16px 60px;
    color: #4A3F5C;
    min-height: 100vh;
  }
  .container {
    max-width: 460px;
    margin: 0 auto;
  }

  /* ==== COVER ==== */
  .cover {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 32px;
    padding: 36px 24px 28px;
    box-shadow: 0 20px 60px rgba(200, 180, 220, 0.35);
    text-align: center;
    margin-bottom: 22px;
  }
  .cover .emoji { font-size: 52px; margin-bottom: 10px; line-height: 1; }
  .cover h1 {
    font-size: 28px;
    color: #E87A9E;
    font-weight: 800;
    letter-spacing: -0.8px;
    margin-bottom: 8px;
  }
  .cover .subtitle {
    font-size: 13px;
    color: #8B7BA8;
    font-weight: 600;
    margin-bottom: 18px;
  }
  .anniversary {
    background: linear-gradient(135deg, #FFE8EC 0%, #F8DCFF 100%);
    border-radius: 20px;
    padding: 16px 14px;
    margin-bottom: 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 0.7);
  }
  .anniversary .anni-label {
    font-size: 11px;
    color: #9670BA;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .anniversary .anni-days {
    font-size: 32px;
    font-weight: 900;
    color: #E87A9E;
    letter-spacing: -1px;
    line-height: 1.1;
    margin: 2px 0;
  }
  .anniversary .anni-since {
    font-size: 11px;
    color: #B88BC8;
    font-weight: 600;
  }
  .cover .stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding-top: 16px;
    border-top: 2px dashed #F8D4E0;
  }
  .cover .stat { text-align: center; }
  .cover .stat .num {
    font-size: 22px;
    font-weight: 800;
    color: #E87A9E;
    display: block;
  }
  .cover .stat .label {
    font-size: 11px;
    color: #9B88B8;
    font-weight: 700;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  /* ==== FILTER / SORT ==== */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    padding: 0 4px;
  }
  .chip {
    flex: 1;
    padding: 10px;
    background: rgba(255, 255, 255, 0.8);
    border: none;
    border-radius: 14px;
    font-size: 12px;
    font-weight: 700;
    color: #8B7BA8;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .chip.active {
    background: #E87A9E;
    color: #FFF;
    box-shadow: 0 4px 12px rgba(232, 122, 158, 0.35);
  }

  /* ==== DATE CARD ==== */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .date-card {
    background: rgba(255, 255, 255, 0.92);
    border-radius: 22px;
    padding: 18px 18px 16px;
    box-shadow: 0 8px 24px rgba(200, 180, 220, 0.25);
    text-decoration: none;
    color: inherit;
    display: block;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .date-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 32px rgba(200, 180, 220, 0.4);
  }
  .date-card .top-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .date-card .big-emoji {
    font-size: 36px;
    line-height: 1;
    flex-shrink: 0;
  }
  .date-card .title-block { flex: 1; min-width: 0; }
  .date-card .title {
    font-size: 16px;
    font-weight: 800;
    color: #4A3F5C;
    letter-spacing: -0.3px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .date-card .date-text {
    font-size: 12px;
    color: #9B88B8;
    font-weight: 700;
  }
  .date-card .arrow {
    font-size: 20px;
    color: #D4B8E8;
    flex-shrink: 0;
  }
  .date-card .route {
    font-size: 11.5px;
    color: #7A6B94;
    line-height: 1.5;
    background: #F8EEFA;
    padding: 8px 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .date-card .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .date-card .tag {
    padding: 3px 10px;
    background: #FFE0E8;
    border-radius: 10px;
    font-size: 10.5px;
    color: #D96B8A;
    font-weight: 700;
  }
  .date-card .tag.blue { background: #DCE8F7; color: #5E87B8; }
  .date-card .tag.purple { background: #ECDCF7; color: #9670BA; }
  .date-card .tag.yellow { background: #FFF3C4; color: #B8860B; }
  .date-card .tag.green { background: #E0F0E6; color: #5A9670; }

  /* theme accents */
  .date-card.theme-pink { background: linear-gradient(135deg, #FFFFFF 0%, #FFF4F7 100%); }
  .date-card.theme-blue { background: linear-gradient(135deg, #FFFFFF 0%, #F0F6FC 100%); }
  .date-card.theme-purple { background: linear-gradient(135deg, #FFFFFF 0%, #F8F3FC 100%); }
  .date-card.theme-yellow { background: linear-gradient(135deg, #FFFFFF 0%, #FFFAEB 100%); }
  .date-card.theme-green { background: linear-gradient(135deg, #FFFFFF 0%, #F0F8F3 100%); }

  /* ==== ADD NEW ==== */
  .add-card {
    margin-top: 14px;
    padding: 22px;
    border: 2.5px dashed #E0C8E8;
    border-radius: 22px;
    background: rgba(255, 255, 255, 0.5);
    text-align: center;
    color: #9670BA;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-card:hover {
    background: rgba(255, 255, 255, 0.8);
    border-color: #B88BC8;
  }
  .add-card .plus {
    font-size: 22px;
    display: block;
    margin-bottom: 4px;
  }
  .add-card .hint {
    font-size: 11px;
    color: #B8A8CC;
    margin-top: 6px;
    font-weight: 500;
    line-height: 1.5;
  }

  /* ==== EMPTY ==== */
  .empty {
    text-align: center;
    padding: 50px 20px;
    color: #B8A8CC;
    font-size: 13px;
    font-weight: 600;
  }

  /* ==== FOOTER ==== */
  .footer {
    margin-top: 26px;
    text-align: center;
    font-size: 11.5px;
    color: #A89BB9;
    font-weight: 500;
    line-height: 1.7;
  }
  .footer .heart { color: #E87A9E; }
</style>
</head>
<body>
  <div class="container">

    <!-- COVER -->
    <div class="cover">
      <div class="emoji">💕📔</div>
      <h1>우리의 데이트 앨범</h1>
      <div class="subtitle">함께한 순간들을 모아서</div>

      <div class="anniversary">
        <span class="anni-label">우리가 만난 지</span>
        <span class="anni-days" id="anni-days">D+0</span>
        <span class="anni-since">2024.11.23부터 💕</span>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="num" id="stat-count">0</span>
          <span class="label">DATES</span>
        </div>
        <div class="stat">
          <span class="num" id="stat-first">—</span>
          <span class="label">FIRST</span>
        </div>
        <div class="stat">
          <span class="num" id="stat-latest">—</span>
          <span class="label">LATEST</span>
        </div>
      </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <button class="chip active" data-sort="newest">✨ 최신순</button>
      <button class="chip" data-sort="oldest">📅 오래된순</button>
    </div>

    <!-- LIST -->
    <div class="card-list" id="card-list"></div>

    <!-- ADD NEW -->
    <div class="add-card" onclick="alert('새 데이트 타임라인은 Claude한테 부탁하세요 💕\n\n예시:\n\'오늘 홍대 데이트 다녀왔어, 앨범에 추가해줘\'\n\'내일 제주도 가는 일정 짜서 앨범에 넣어줘\'\n\nClaude가 dates/ 폴더에 파일 만들고\nindex.html DATES 배열에 자동으로 추가해줄 거예요.');">
      <span class="plus">💌</span>
      새 데이트 추가하기
      <div class="hint">Claude한테 "앨범에 추가해줘"라고 말하면 끝!</div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      💌 <span class="heart">우리만의 작은 기록</span><br>
      매일이 특별해
    </div>

  </div>

<script>
  // ==========================================
  // 📌 여기에 데이트를 하나씩 추가하세요!
  // 새 데이트를 만들 때마다 이 배열의 맨 위에 한 줄 추가하면 됩니다.
  // ==========================================
  const DATES = [
    {
      file: "dates/2025-XX-XX_hangang.html",
      date: "2025-XX-XX",        // YYYY-MM-DD 형식
      weekday: "일요일",
      emoji: "🚢🌸",
      title: "우리의 한강 데이트",
      route: "서울대입구 → 여의도 → 압구정 → 반포",
      tags: [
        { text: "한강버스", color: "blue" },
        { text: "한강라면", color: "pink" },
        { text: "빕스 디너", color: "yellow" }
      ],
      theme: "pink"   // pink | blue | purple | yellow | green
    },
    // 👇 새 데이트를 여기 추가 (맨 위에 추가하면 최신순 정렬됨)
    // {
    //   file: "dates/2026-05-15_jeju.html",
    //   date: "2026-05-15",
    //   weekday: "금요일",
    //   emoji: "🏝️🌊",
    //   title: "제주도 1박 2일",
    //   route: "공항 → 협재 → 서귀포",
    //   tags: [{ text: "바다", color: "blue" }],
    //   theme: "blue"
    // },
  ];

  // ==========================================
  // 아래는 건드리지 않아도 됩니다 (렌더링 로직)
  // ==========================================
  const list = document.getElementById('card-list');
  const sortBtns = document.querySelectorAll('.chip');
  let currentSort = 'newest';

  function formatDate(isoDate) {
    if (!isoDate || isoDate.includes('XX')) return isoDate || '';
    const [y, m, d] = isoDate.split('-');
    return `${y.slice(2)}.${m}.${d}`;
  }

  // D+day counter since 2024-11-23
  function updateAnniversary() {
    const start = new Date(2024, 10, 23); // month is 0-indexed → 10 = Nov
    const today = new Date();
    start.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);
    const diff = Math.floor((today - start) / (1000 * 60 * 60 * 24)) + 1;
    document.getElementById('anni-days').textContent = 'D+' + diff;
  }
  updateAnniversary();

  function render() {
    const sorted = [...DATES].sort((a, b) => {
      return currentSort === 'newest'
        ? b.date.localeCompare(a.date)
        : a.date.localeCompare(b.date);
    });

    // stats
    document.getElementById('stat-count').textContent = DATES.length;
    if (DATES.length > 0) {
      const dates = DATES.map(d => d.date).sort();
      document.getElementById('stat-first').textContent = formatDate(dates[0]).slice(0, 5);
      document.getElementById('stat-latest').textContent = formatDate(dates[dates.length - 1]).slice(0, 5);
    }

    if (sorted.length === 0) {
      list.innerHTML = '<div class="empty">아직 데이트가 없어요<br>첫 번째 데이트를 추가해볼까요? 💕</div>';
      return;
    }

    list.innerHTML = sorted.map(d => `
      <a class="date-card theme-${d.theme || 'pink'}" href="${d.file}">
        <div class="top-row">
          <div class="big-emoji">${d.emoji || '💕'}</div>
          <div class="title-block">
            <div class="title">${d.title}</div>
            <div class="date-text">${formatDate(d.date)}${d.weekday ? ' · ' + d.weekday : ''}</div>
          </div>
          <div class="arrow">›</div>
        </div>
        ${d.route ? `<div class="route">${d.route}</div>` : ''}
        ${d.tags && d.tags.length ? `<div class="tags">${d.tags.map(t => `<span class="tag ${t.color || ''}">${t.text}</span>`).join('')}</div>` : ''}
      </a>
    `).join('');
  }

  sortBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      sortBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSort = btn.dataset.sort;
      render();
    });
  });

  render();
</script>
</body>
</html>
